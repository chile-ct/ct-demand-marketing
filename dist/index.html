// Generate T5 RAW channel data by scaling T4 channel proportions to T5 vertical totals
(() => {
  const T4M = "2026-04",
    T5M = "2026-05";
  const vMap = {
    PTY: "PTY",
    JOB: "JOB",
    VEH: "VEH",
    GDS: "GDS"
  };
  Object.entries(vMap).forEach(([v]) => {
    const t4rows = RAW.filter(r => r.v === v && r.m === T4M);
    const t4dau = t4rows.reduce((s, r) => s + r.dau, 0) || 1;
    const t4dwl = t4rows.reduce((s, r) => s + r.dwl, 0) || 1;
    const t4lead = t4rows.reduce((s, r) => s + r.lead, 0) || 1;
    const tgt = VERT_ACT[v][T5M];
    t4rows.forEach(r => {
      RAW.push({
        v,
        ch: r.ch,
        m: T5M,
        dau: Math.round(r.dau / t4dau * tgt.dau),
        dwl: Math.round(r.dwl / t4dwl * tgt.dwl),
        lead: Math.round(r.lead / t4lead * tgt.lead)
      });
    });
  });
})();

// Pre-process RAW → DATA (merge channels, runs AFTER T5 entries added)
const DATA = (() => {
  const map = {};
  RAW.forEach(r => {
    const ch = normChannel(r.ch);
    const key = `${r.v}|${ch}|${r.m}`;
    if (!map[key]) map[key] = {
      ...r,
      ch,
      dau: 0,
      dwl: 0,
      lead: 0
    };
    map[key].dau += r.dau;
    map[key].dwl += r.dwl;
    map[key].lead += r.lead;
  });
  return Object.values(map);
})();
