name: Update Dashboard Data

on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install google-cloud-bigquery google-auth

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp-creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> $GITHUB_ENV

      - run: python scripts/update_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "Auto update $(date +'%d/%m/%Y')"
            git push
          )
