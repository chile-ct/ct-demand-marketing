name: Update Dashboard Data

on:
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install google-cloud-bigquery google-auth

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GCP_USER_CREDENTIALS }}' > /tmp/gcp-creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json" >> $GITHUB_ENV

      - run: python scripts/update_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "chile@chotot.vn"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m') [skip ci]"
            git push
          fi
